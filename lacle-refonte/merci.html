<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Message envoyé — Merci ! | La Clé</title>
<meta name="description" content="Votre message a bien été envoyé à La Clé. On vous répond sous 24h ouvrées." />
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#161210" />
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
<script>
(function(){var t;try{t=localStorage.getItem('lacle-theme');}catch(e){}if(!t){var d=new Date(),h=d.getHours()+d.getMinutes()/60,m=d.getMonth();var r=[8,7,7,7,6,6,6,7,7,8,7,8][m],s=[17,18,19,20,21,21,21,21,20,19,17,17][m];t=(h>=r&&h<s)?'day':'night';}if(t==='night')document.documentElement.classList.add('theme-night');})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Caveat:wght@500;600;700&family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/style.css" />
<style>
  body { display: flex; align-items: center; justify-content: center;
         min-height: 100svh; text-align: center; padding: 32px; }
  .merci { max-width: 540px; }
  .merci .key { width: 70px; height: 70px; margin: 0 auto 30px; }
  .merci h1 { font-size: clamp(40px, 8vw, 72px); margin: 16px 0 20px; }
  .merci p {
    font-family: var(--serif); font-size: clamp(17px, 3vw, 21px);
    color: var(--cream-soft); margin-bottom: 34px;
  }
</style>
</head>
<body>
  <div class="merci">
    <svg class="key" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <g fill="none" stroke="#c9971f" stroke-width="5" stroke-linecap="round">
        <circle cx="24" cy="24" r="11"/><path d="M31 31 L48 48"/>
        <path d="M41 41 L48 34 M45 45 L52 38"/>
      </g>
    </svg>
    <span class="eyebrow">Message reçu</span>
    <h1 class="h-display">La porte est <span class="serif-accent">ouverte.</span></h1>
    <p>Merci pour votre message — on l'a bien reçu. On revient vers vous
       sous 24h ouvrées, avec un échange clair et sans engagement.</p>
    <a href="index.html" class="btn btn-primary">
      <svg viewBox="0 0 24 24" fill="none"><path d="M19 12H5M11 18l-6-6 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Retour à l'accueil
